function authHeaders() {

async function login(email, password) {

// ---------- Ripple effect on all buttons ----------
document.getElementById("app") && document.addEventListener("click", (e) => {
  const btn = e.target.closest("#app button");
  if (!btn) return;
  const rect = btn.getBoundingClientRect();
  const ripple = document.createElement("span");
  const size = Math.max(rect.width, rect.height);
  ripple.className = "ripple";
  ripple.style.width = ripple.style.height = size + "px";
  ripple.style.left = (e.clientX - rect.left - size / 2) + "px";
  ripple.style.top = (e.clientY - rect.top - size / 2) + "px";
  btn.appendChild(ripple);
  setTimeout(() => ripple.remove(), 650);
});

// ---------- Toasts ----------
function showToast(message, type = "success") {
  const wrap = document.getElementById("toastWrap");
  const el = document.createElement("div");
  el.className = `toast ${type}`;
  el.textContent = message;
  wrap.appendChild(el);
  setTimeout(() => {
    el.style.transition = "opacity 0.25s ease";
    el.style.opacity = "0";
    setTimeout(() => el.remove(), 250);
  }, 2600);
}

// ---------- Modal (confirm delete / renew) ----------
function openModal({ title, body, confirmLabel, danger = false, showInput = false, inputValue = "30" }) {
  return new Promise((resolve) => {
    const root = document.getElementById("modalRoot");
    root.innerHTML = `
      <div class="modal-overlay" id="modalOverlay">
        <div class="modal-box">
          <h3>${title}</h3>
          <p>${body}</p>
          ${showInput ? `<input id="modalInput" type="number" min="1" value="${inputValue}" placeholder="Days" />` : ""}
          <div class="modal-actions">
            <button id="modalCancel" style="background:transparent; color:var(--text-secondary); box-shadow:none; border:1.5px solid var(--border);">Cancel</button>
            <button id="modalConfirm" style="${danger ? 'background:linear-gradient(135deg, var(--clay), var(--danger));' : ''}">${confirmLabel}</button>
          </div>
        </div>
      </div>`;
    const close = (result) => { root.innerHTML = ""; resolve(result); };
    document.getElementById("modalOverlay").addEventListener("click", (e) => {
      if (e.target.id === "modalOverlay") close(null);
    });
    document.getElementById("modalCancel").onclick = () => close(null);
    document.getElementById("modalConfirm").onclick = () => {
      if (showInput) {
        const val = document.getElementById("modalInput").value;
        if (!val || Number(val) <= 0) return;
        close(val);
      } else {
        close(true);
      }
    };
  });
}

async function fetchStudents() {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/students?select=*&order=created_at.desc`, { headers: authHeaders() });
  if (!res.ok) throw new Error("Failed to load: " + await res.text());
  return res.json();
}

async function addStudent(name, course, days) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/students`, {
    method: "POST",
    headers: authHeaders(),
    body: JSON.stringify([{ name, course_name: course, duration_days: Number(days), start_date: new Date().toISOString().slice(0,10) }])
  });
  if (!res.ok) throw new Error("Failed to add: " + await res.text());
  return res.json();
}

async function renewStudent(id, days) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/students?id=eq.${id}`, {
    method: "PATCH",
    headers: authHeaders(),
    body: JSON.stringify({ start_date: new Date().toISOString().slice(0,10), duration_days: Number(days) })
  });
  if (!res.ok) throw new Error("Failed to renew: " + await res.text());
  return res.json();
}

async function deleteStudent(id) {
  await fetch(`${SUPABASE_URL}/rest/v1/students?id=eq.${id}`, { method: "DELETE", headers: authHeaders() });
}

function daysLeft(startDate, duration) {
  const start = new Date(startDate);
  const end = new Date(start);
  end.setDate(end.getDate() + Number(duration));
  const today = new Date();
  today.setHours(0,0,0,0);
  end.setHours(0,0,0,0);
  const diff = Math.round((end - today) / 86400000);
  return diff;
}

function updateStats(students) {
  const total = students.length;
  let expiring = 0, expired = 0;
  students.forEach(s => {
    const left = daysLeft(s.start_date, s.duration_days);
    if (left <= 0) expired++;
    else if (left <= 3) expiring++;
  });
  document.getElementById("statTotal").textContent = total;
  document.getElementById("statExpiring").textContent = expiring;
  document.getElementById("statExpired").textContent = expired;
}

function getFilteredSortedStudents() {
  const query = document.getElementById("searchInput").value.trim().toLowerCase();
  const sortMode = document.getElementById("sortSelect").value;

  let list = currentStudents.filter(s =>
    !query || s.name.toLowerCase().includes(query) || s.course_name.toLowerCase().includes(query)
  );

  if (sortMode === "urgency") {
    list = [...list].sort((a, b) => daysLeft(a.start_date, a.duration_days) - daysLeft(b.start_date, b.duration_days));
  } else if (sortMode === "name") {
    list = [...list].sort((a, b) => a.name.localeCompare(b.name));
  }

  return list;
}

    list.innerHTML = `
      <div class="empty-state">
        <div class="icon-wrap"><i class="ti ti-yoga" aria-hidden="true"></i></div>
        <p>No students yet — add your first one above.</p>
      </div>`;
    return;
  }

  if (!students.length) {
    list.innerHTML = `
      <div class="empty-state">
        <div class="icon-wrap"><i class="ti ti-search" aria-hidden="true"></i></div>
        <p>No students match your search.</p>
      </div>`;
    return;
  }

  list.innerHTML = students.map(s => {
    const left = daysLeft(s.start_date, s.duration_days);
    const expired = left <= 0;
    const colorBg = expired ? "var(--danger-bg)" : (left <= 3 ? "var(--warning-bg)" : "var(--success-bg)");
    const colorText = expired ? "var(--danger)" : (left <= 3 ? "var(--warning)" : "var(--success)");
    return `
      <div class="card">
        <div>
          <div class="name">${escapeHtml(s.name)}</div>
          <div class="sub">${escapeHtml(s.course_name)} · started ${s.start_date}</div>
        </div>
        <div style="display:flex; align-items:center; gap:14px;">
          <span class="badge" style="background:${colorBg}; color:${colorText};">${expired ? "Expired" : left + " day" + (left===1?"":"s") + " left"}</span>
          ${expired ? `<button data-renew="${s.id}"><i class="ti ti-refresh" style="font-size:15px;vertical-align:-2px;" aria-hidden="true"></i> Renew</button>` : ""}
          <button data-delete="${s.id}" aria-label="Delete ${escapeHtml(s.name)}"><i class="ti ti-trash" style="font-size:15px;" aria-hidden="true"></i></button>
        </div>
      </div>`;
  }).join("");

  list.querySelectorAll("[data-delete]").forEach(btn => {
    btn.onclick = async () => {
      const id = btn.getAttribute("data-delete");
      const student = currentStudents.find(s => String(s.id) === String(id));
      const confirmed = await openModal({
        title: "Remove student?",
        body: `This will permanently remove ${student ? escapeHtml(student.name) : "this student"} from the roster.`,
        confirmLabel: "Remove",
        danger: true
      });
      if (!confirmed) return;
      btn.disabled = true;
      try {
        await deleteStudent(id);
        showToast("Student removed", "success");
        await refresh();
      } catch (e) {
        showToast(e.message, "error");
        btn.disabled = false;
      }
    };
  });

  list.querySelectorAll("[data-renew]").forEach(btn => {
    btn.onclick = async () => {
      const id = btn.getAttribute("data-renew");
      const student = currentStudents.find(s => String(s.id) === String(id));
      const days = await openModal({
        title: "Renew course",
        body: `Set a new duration for ${student ? escapeHtml(student.name) : "this student"}, starting today.`,
        confirmLabel: "Renew",
        showInput: true,
        inputValue: student ? student.duration_days : 30
      });
      if (!days) return;
      btn.disabled = true;
      try {
        await renewStudent(id, days);
        showToast("Course renewed", "success");
        await refresh();
      } catch (e) {
        showToast(e.message, "error");
        btn.disabled = false;
      }
    };
  });
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

function showSkeleton() {
  const list = document.getElementById("list");
  list.innerHTML = Array.from({ length: 3 }).map(() => `<div class="skeleton"></div>`).join("");
}

function setLastUpdated() {
  const el = document.getElementById("lastUpdated");
  const now = new Date();
  el.textContent = "Updated " + now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

async function refresh({ silent = false } = {}) {
  if (!silent) showSkeleton();
  try {
    currentStudents = await fetchStudents();
    updateStats(currentStudents);
    renderList();
    setLastUpdated();
  } catch (e) {
    document.getElementById("list").innerHTML = `<p style="color:var(--danger); font-size:14px;">${escapeHtml(e.message)}</p>`;
  }
}

document.getElementById("addBtn").onclick = async () => {
  const nameEl = document.getElementById("nameInput");
  const courseEl = document.getElementById("courseInput");
  const daysEl = document.getElementById("daysInput");
  const btn = document.getElementById("addBtn");

  const name = nameEl.value.trim();
  const course = courseEl.value.trim();
  const days = daysEl.value.trim();
  if (!name || !course || !days || Number(days) <= 0) {
    showToast("Fill in all fields with a valid duration.", "error");
    return;
  }
  btn.disabled = true;
  try {
    await addStudent(name, course, days);
    nameEl.value = "";
    courseEl.value = "";
    daysEl.value = "";
    showToast("Student added", "success");
    await refresh();
    nameEl.focus();
  } catch (e) {
    showToast(e.message, "error");
  } finally {
    btn.disabled = false;
  }
};

["nameInput", "courseInput", "daysInput"].forEach(id => {
  document.getElementById(id).addEventListener("keydown", (e) => {
    if (e.key === "Enter") document.getElementById("addBtn").click();
  });
});

document.getElementById("searchInput").addEventListener("input", renderList);
document.getElementById("sortSelect").addEventListener("change", renderList);

setInterval(() => { if (accessToken) refresh({ silent: true }); }, 60000);
</script>
