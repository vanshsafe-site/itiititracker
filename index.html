<div id="app">
  <style>
    #app * { box-sizing: border-box; font-family: var(--font-sans); }
    #app h2 { font-size: 18px; font-weight: 500; margin: 0 0 1rem; }
    #app .row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1.5rem; }
    #app input { flex: 1; min-width: 140px; }
    #app .card { background: var(--surface-2); border: 0.5px solid var(--border); border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; gap: 12px; }
    #app .name { font-weight: 500; font-size: 15px; }
    #app .sub { font-size: 13px; color: var(--text-secondary); }
    #app .days { font-size: 22px; font-weight: 500; min-width: 90px; text-align: right; }
    #app .badge { font-size: 12px; padding: 3px 10px; border-radius: var(--radius); }
    #app .login-box { max-width: 320px; margin: 2rem auto; background: var(--surface-2); border: 0.5px solid var(--border); border-radius: 12px; padding: 1.5rem; }
    #app .login-box input { width: 100%; margin-bottom: 10px; }
    #app .error-text { color: var(--text-danger); font-size: 13px; margin: 6px 0 0; }
    #app .topbar { display: flex; justify-content: flex-end; margin-bottom: 8px; }
  </style>

  <h2 class="sr-only" style="position:absolute;left:-9999px;">Course purchase tracker showing days remaining for each student, with renewal option, behind a login</h2>

  <div id="loginScreen" class="login-box">
    <p style="font-weight:500; font-size:15px; margin:0 0 12px;">Sign in</p>
    <input id="emailInput" type="email" placeholder="name@company.com" autocomplete="username" />
    <input id="passwordInput" type="password" placeholder="Password" autocomplete="current-password" />
    <button id="loginBtn" style="width:100%;">Sign in</button>
    <p id="loginError" class="error-text"></p>
  </div>

  <div id="mainScreen" style="display:none;">
    <div class="topbar">
      <button id="logoutBtn"><i class="ti ti-logout" style="font-size:15px;vertical-align:-2px;" aria-hidden="true"></i> Sign out</button>
    </div>
    <div class="row">
      <input id="nameInput" placeholder="Student name" />
      <input id="courseInput" placeholder="Course name" />
      <input id="daysInput" type="number" placeholder="Duration (days)" style="max-width:140px;" />
      <button id="addBtn" style="white-space:nowrap;"><i class="ti ti-plus" style="font-size:16px;vertical-align:-2px;" aria-hidden="true"></i> Add</button>
    </div>
    <div id="list"></div>
  </div>
</div>

<script>
const SUPABASE_URL = "https://rojkozrmmukpffbfgnuh.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJvamtvenJtbXVrcGZmYmZnbnVoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQwMjI5ODQsImV4cCI6MjA5OTU5ODk4NH0.G01FXklOgAYL3e-two9y5oDG_wGVR4Q8PkfHQDsryzs";

let accessToken = null;

function authHeaders() {
  return {
    "apikey": SUPABASE_KEY,
    "Authorization": "Bearer " + (accessToken || SUPABASE_KEY),
    "Content-Type": "application/json",
    "Prefer": "return=representation"
  };
}

async function login(email, password) {
  const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
    method: "POST",
    headers: { "apikey": SUPABASE_KEY, "Content-Type": "application/json" },
    body: JSON.stringify({ email, password })
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error_description || data.msg || "Invalid email or password.");
  accessToken = data.access_token;
}

function showApp() {
  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("mainScreen").style.display = "block";
  refresh();
}

function showLogin() {
  accessToken = null;
  document.getElementById("mainScreen").style.display = "none";
  document.getElementById("loginScreen").style.display = "block";
}

document.getElementById("loginBtn").onclick = async () => {
  const email = document.getElementById("emailInput").value.trim();
  const password = document.getElementById("passwordInput").value;
  const errEl = document.getElementById("loginError");
  errEl.textContent = "";
  if (!email || !password) { errEl.textContent = "Enter email and password."; return; }
  try {
    await login(email, password);
    showApp();
  } catch (e) {
    errEl.textContent = e.message;
  }
};

document.getElementById("logoutBtn").onclick = showLogin;

async function fetchStudents() {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/students?select=*&order=created_at.desc`, { headers: authHeaders() });
  if (!res.ok) throw new Error("Failed to load: " + await res.text());
  return res.json();
}

async function addStudent(name, course, days) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/students`, {
    method: "POST",
    headers: authHeaders(),
    body: JSON.stringify([{ name, course_name: course, duration_days: Number(days), start_date: new Date().toISOString().slice(0,10) }])
  });
  if (!res.ok) throw new Error("Failed to add: " + await res.text());
  return res.json();
}

async function renewStudent(id, days) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/students?id=eq.${id}`, {
    method: "PATCH",
    headers: authHeaders(),
    body: JSON.stringify({ start_date: new Date().toISOString().slice(0,10), duration_days: Number(days) })
  });
  if (!res.ok) throw new Error("Failed to renew: " + await res.text());
  return res.json();
}

async function deleteStudent(id) {
  await fetch(`${SUPABASE_URL}/rest/v1/students?id=eq.${id}`, { method: "DELETE", headers: authHeaders() });
}

function daysLeft(startDate, duration) {
  const start = new Date(startDate);
  const end = new Date(start);
  end.setDate(end.getDate() + Number(duration));
  const today = new Date();
  today.setHours(0,0,0,0);
  end.setHours(0,0,0,0);
  const diff = Math.round((end - today) / 86400000);
  return diff;
}

function render(students) {
  const list = document.getElementById("list");
  if (!students.length) {
    list.innerHTML = `<p style="color:var(--text-muted); font-size:14px;">No students yet. Add one above.</p>`;
    return;
  }
  list.innerHTML = students.map(s => {
    const left = daysLeft(s.start_date, s.duration_days);
    const expired = left <= 0;
    const colorBg = expired ? "var(--bg-danger)" : (left <= 3 ? "var(--bg-warning)" : "var(--bg-success)");
    const colorText = expired ? "var(--text-danger)" : (left <= 3 ? "var(--text-warning)" : "var(--text-success)");
    return `
      <div class="card">
        <div>
          <div class="name">${escapeHtml(s.name)}</div>
          <div class="sub">${escapeHtml(s.course_name)} · started ${s.start_date}</div>
        </div>
        <div style="display:flex; align-items:center; gap:14px;">
          <span class="badge" style="background:${colorBg}; color:${colorText};">${expired ? "Expired" : left + " day" + (left===1?"":"s") + " left"}</span>
          ${expired ? `<button data-renew="${s.id}"><i class="ti ti-refresh" style="font-size:15px;vertical-align:-2px;" aria-hidden="true"></i> Renew</button>` : ""}
          <button data-delete="${s.id}" aria-label="Delete"><i class="ti ti-trash" style="font-size:15px;" aria-hidden="true"></i></button>
        </div>
      </div>`;
  }).join("");

  list.querySelectorAll("[data-delete]").forEach(btn => {
    btn.onclick = async () => {
      await deleteStudent(btn.getAttribute("data-delete"));
      await refresh();
    };
  });

  list.querySelectorAll("[data-renew]").forEach(btn => {
    btn.onclick = async () => {
      const days = prompt("Renew for how many days?", "30");
      if (!days) return;
      await renewStudent(btn.getAttribute("data-renew"), days);
      await refresh();
    };
  });
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

async function refresh() {
  try {
    const students = await fetchStudents();
    render(students);
  } catch (e) {
    document.getElementById("list").innerHTML = `<p style="color:var(--text-danger); font-size:14px;">${escapeHtml(e.message)}</p>`;
  }
}

document.getElementById("addBtn").onclick = async () => {
  const name = document.getElementById("nameInput").value.trim();
  const course = document.getElementById("courseInput").value.trim();
  const days = document.getElementById("daysInput").value.trim();
  if (!name || !course || !days) return alert("Fill in all fields.");
  await addStudent(name, course, days);
  document.getElementById("nameInput").value = "";
  document.getElementById("courseInput").value = "";
  document.getElementById("daysInput").value = "";
  await refresh();
};

setInterval(() => { if (accessToken) refresh(); }, 60000);
</script>
